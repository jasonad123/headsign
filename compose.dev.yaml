# ==============================================================================
# Docker Compose Configuration (Development & Production)
# ==============================================================================
# Optimized configuration using corepack, BuildKit cache mounts, and heap limits.
# For legacy version (npm install -g pnpm), use compose.legacy.yaml instead.
#
# Usage:
#   Production: docker compose -f compose.dev.yaml --profile production up -d
#   Development: docker compose -f compose.dev.yaml --profile dev up
#   Build only:  docker compose -f compose.dev.yaml --profile build up
# ==============================================================================

services:
  # Production service using optimized Dockerfile
  headsign-svelte:
    env_file:
      - .env
    build:
      context: .
      dockerfile: Dockerfile
    image: headsign-svelte
    container_name: headsign-svelte
    restart: unless-stopped
    ports:
      - '8080:8080'
    environment:
      NODE_ENV: 'production'
      USE_SVELTE: 'true'
    volumes:
      - ./logs:/app/logs
    networks:
      - headsign-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    profiles:
      - production

  # Frontend builder service
  frontend-builder:
    image: node:24-alpine@sha256:2bdb65ed1dab192432bc31c95f94155ca5ad7fc1392fb7eb7526ab682fa5bf14
    container_name: frontend-builder
    working_dir: /app/svelte-app
    volumes:
      - ./svelte-app:/app/svelte-app
      - frontend_modules:/app/svelte-app/node_modules
    networks:
      - headsign-network
    command:
      - sh
      - -c
      - |
        corepack enable
        corepack prepare pnpm@latest --activate
        pnpm install
        pnpm run build
    profiles:
      - build

  # Backend builder service
  backend-builder:
    image: node:24-alpine@sha256:2bdb65ed1dab192432bc31c95f94155ca5ad7fc1392fb7eb7526ab682fa5bf14
    container_name: backend-builder
    working_dir: /app
    volumes:
      - ./server:/app/server
      - ./package.json:/app/package.json
      - ./pnpm-lock.yaml:/app/pnpm-lock.yaml
      - backend_modules:/app/node_modules
    networks:
      - headsign-network
    command:
      - sh
      - -c
      - |
        corepack enable
        corepack prepare pnpm@latest --activate
        pnpm install --prod
    profiles:
      - build

  # Development service - Svelte with hot reload
  headsign-dev:
    image: node:24-alpine@sha256:2bdb65ed1dab192432bc31c95f94155ca5ad7fc1392fb7eb7526ab682fa5bf14
    container_name: headsign-dev
    working_dir: /app/svelte-app
    restart: 'no'
    ports:
      - '5173:5173' # Vite dev server
    environment:
      NODE_ENV: 'development'
      CI: 'true'
      VITE_API_PROXY: 'http://headsign-backend:8080'
    env_file:
      - .env.development.local
    volumes:
      - ./svelte-app:/app/svelte-app
      - dev_svelte_modules:/app/svelte-app/node_modules
    networks:
      - headsign-network
    command:
      - sh
      - -c
      - |
        corepack enable
        corepack prepare pnpm@latest --activate
        pnpm install
        pnpm run dev -- --host 0.0.0.0
    profiles:
      - dev

  # Backend service for development
  headsign-backend:
    image: node:24-alpine@sha256:2bdb65ed1dab192432bc31c95f94155ca5ad7fc1392fb7eb7526ab682fa5bf14
    container_name: headsign-backend
    working_dir: /app
    restart: 'no'
    ports:
      - '8080:8080'
    environment:
      NODE_ENV: 'development'
      USE_SVELTE: 'false'
      CI: 'true'
    env_file:
      - .env.development.local
    volumes:
      - .:/app
      - dev_modules:/app/node_modules
    networks:
      - headsign-network
    command:
      - sh
      - -c
      - |
        corepack enable
        corepack prepare pnpm@latest --activate
        pnpm install
        node --max-old-space-size=400 server/app.js
    profiles:
      - dev

volumes:
  frontend_modules:
  backend_modules:
  dev_modules:
  dev_svelte_modules:

networks:
  headsign-network:
    driver: bridge
